name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Describe the pain point.
      placeholder: "When working with large repos, I need..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: dropdown
    id: edition
    attributes:
      label: Edition
      description: Which edition(s) would this affect?
      multiple: true
      options:
        - All editions
        - Claude Code
        - Cursor
        - GitHub Copilot
        - CLI (setup-vibeflow)
        - Site / Docs
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered?
    validations:
      required: false
